name: Deploy Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-oracle.yml"
      - "Dockerfile"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "src/**"
      - "deploy/**"
  workflow_dispatch:

concurrency:
  group: deploy-oracle-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant Gradle execute permission
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Compute image metadata
        id: image
        run: |
          IMAGE_REPOSITORY="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "repository=ghcr.io/${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=ghcr.io/${IMAGE_REPOSITORY}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=ghcr.io/${IMAGE_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Configure SSH
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${OCI_SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${OCI_HOST}" >> ~/.ssh/known_hosts

      - name: Upload docker compose file
        env:
          OCI_DEPLOY_PATH: ${{ secrets.OCI_DEPLOY_PATH }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
        run: |
          scp deploy/docker-compose.prod.yml \
            "${OCI_USERNAME}@${OCI_HOST}:${OCI_DEPLOY_PATH}/docker-compose.prod.yml"

      - name: Deploy on Oracle VM
        env:
          OCI_DEPLOY_PATH: ${{ secrets.OCI_DEPLOY_PATH }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          APP_IMAGE: ${{ steps.image.outputs.sha_tag }}
        run: |
          ssh "${OCI_USERNAME}@${OCI_HOST}" \
            "OCI_DEPLOY_PATH='${OCI_DEPLOY_PATH}' APP_IMAGE='${APP_IMAGE}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" <<'EOF'
          set -eu
          cd "${OCI_DEPLOY_PATH}"

          if [ ! -f .env ]; then
            echo "/opt/tdch/.env is missing."
            exit 1
          fi

          echo "Deploying image: ${APP_IMAGE}"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          docker pull "${APP_IMAGE}"
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker image prune -f
          EOF
