# HTTP context: shared media rate limit and origin/referrer allowlist maps.
limit_req_zone $binary_remote_addr zone=tdch_media:10m rate=20r/s;

map $http_referer $tdch_media_referer_allowed {
    default 0;
    "" 1;
    ~^https?://(tdch\.co\.kr|www\.tdch\.co\.kr|api\.tdch\.co\.kr)(/|$) 1;
}

map $http_origin $tdch_media_origin_allowed {
    default 0;
    "" 1;
    "https://tdch.co.kr" 1;
    "https://www.tdch.co.kr" 1;
    "https://api.tdch.co.kr" 1;
}

map "$tdch_media_referer_allowed:$tdch_media_origin_allowed" $tdch_media_allowed {
    default 0;
    ~^1: 1;
    ~:1$ 1;
}
