# HTTP context snippet: shared upload-asset rate limit and origin/referrer allowlist maps.
# Install this file where nginx includes directives inside the top-level http block,
# such as /etc/nginx/conf.d/tdch-upload-http-context.conf.
limit_req_zone $binary_remote_addr zone=tdch_upload:10m rate=20r/s;

map $http_referer $tdch_upload_referer_allowed {
    default 0;
    "" 1;
    ~^https?://(tdch\.co\.kr|www\.tdch\.co\.kr|api\.tdch\.co\.kr)(/|$) 1;
}

map $http_origin $tdch_upload_origin_allowed {
    default 0;
    "" 1;
    "https://tdch.co.kr" 1;
    "https://www.tdch.co.kr" 1;
    "https://api.tdch.co.kr" 1;
}

map "$tdch_upload_referer_allowed:$tdch_upload_origin_allowed" $tdch_upload_allowed {
    default 0;
    ~^1: 1;
    ~:1$ 1;
}
