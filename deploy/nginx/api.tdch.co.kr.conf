server {
    listen 80;
    listen [::]:80;
    server_name api.tdch.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.tdch.co.kr;

    client_max_body_size 12m;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_certificate /etc/letsencrypt/live/api.tdch.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tdch.co.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Server context: serve uploaded media after http-context origin/referrer checks.
    location /media/ {
        alias /opt/tdch/uploads/;
        limit_req zone=tdch_media burst=40 nodelay;
        try_files $uri =404;

        # Uses $http_referer and $http_origin maps from api.tdch.co.kr.http.conf.
        if ($tdch_media_allowed = 0) {
            return 403;
        }
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
