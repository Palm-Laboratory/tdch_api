server:
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  jpa:
    properties:
      hibernate:
        format_sql: false

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: INFO
