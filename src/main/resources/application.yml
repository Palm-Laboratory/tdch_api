spring:
  application:
    name: thejejachurch-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/thejejachurch}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

youtube:
  api-key: ${YOUTUBE_API_KEY:}
  playlists:
    messages: ${YOUTUBE_MESSAGES_PLAYLIST_ID:}
    better-devotion: ${YOUTUBE_BETTER_DEVOTION_PLAYLIST_ID:}
    its-okay: ${YOUTUBE_ITS_OKAY_PLAYLIST_ID:}

admin:
  sync-key: ${ADMIN_SYNC_KEY:}
