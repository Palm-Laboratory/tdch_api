spring:
  application:
    name: thejejachurch-api
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB
      file-size-threshold: 2MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/thejejachurch}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

admin:
  sync-key: ${ADMIN_SYNC_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://tdch.co.kr,https://www.tdch.co.kr}

tdch.uploads.root-path: ${TDCH_UPLOAD_ROOT:/opt/tdch/uploads}
tdch.uploads.public-base-url: ${TDCH_UPLOAD_PUBLIC_BASE_URL:https://api.tdch.co.kr/media}

youtube:
  api-key: ${YOUTUBE_API_KEY:}
  channel-id: ${YOUTUBE_CHANNEL_ID:}
