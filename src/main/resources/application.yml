spring:
  application:
    name: thejejachurch-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/thejejachurch}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

youtube:
  api-key: ${YOUTUBE_API_KEY:}
  channel-id: ${YOUTUBE_CHANNEL_ID:}
  playlists:
    messages: ${YOUTUBE_MESSAGES_PLAYLIST_ID:}
    better-devotion: ${YOUTUBE_BETTER_DEVOTION_PLAYLIST_ID:}
    its-okay: ${YOUTUBE_ITS_OKAY_PLAYLIST_ID:}

admin:
  sync-key: ${ADMIN_SYNC_KEY:}
  bootstrap:
    username: ${ADMIN_BOOTSTRAP_USERNAME:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
    display-name: ${ADMIN_BOOTSTRAP_DISPLAY_NAME:슈퍼 관리자}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
